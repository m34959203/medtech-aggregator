# Продакшен-сборка для публикации через Cloudflare-туннель technokod.kz.
# Один публичный хост medtech.technokod.kz → фронтенд; /api/* фронт проксирует на бэкенд.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker network connect dvorets-gornyakov_default cloudflared-technokod  # (если ещё не в сети)
#   далее в CF Zero Trust добавить Public Hostname medtech.technokod.kz → http://medtech-frontend:3000
#
# Прод-рантайм БД — Postgres (medtech-db). Схема применяется миграциями на старте
# бэкенда (entrypoint → python -m app.migrate). Хост-порты 8088/8089 — локальная проверка.

services:
  medtech-db:
    image: pgvector/pgvector:pg16
    container_name: medtech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: medtech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medtech}
      POSTGRES_DB: medtech
    volumes:
      - medtech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtech -d medtech"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medtech

  medtech-backend:
    build: ./backend
    container_name: medtech-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://medtech:${POSTGRES_PASSWORD:-medtech}@medtech-db:5432/medtech
      MATCH_CONFIDENCE_THRESHOLD: "0.78"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Чат-помощник/нормализатор: провайдер LLM (auto/gemini/alem/groq).
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ALEM_API_KEY: ${ALEM_API_KEY:-}
      # Gemini через Vertex AI (service-account). SA монтируется ниже read-only,
      # путь внутри контейнера фиксирован — /run/secrets/gemini-sa.json.
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GCP_PROJECT: ${GCP_PROJECT:-}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      # Безопасность: токен админ-зоны (пусто → админ закрыт), cookie только по HTTPS.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # WhatsApp-туннель (внутр. docker-сеть medtech_net). Секрет — только на бэкенде.
      WA_GATEWAY_URL: http://medtech-wa:3200
      WA_API_SECRET: ${WA_API_SECRET:-}
      WA_INBOUND_WEBHOOK_SECRET: ${WA_INBOUND_WEBHOOK_SECRET:-}
    volumes:
      - medtech_data:/data          # загрузки/легаси-SQLite (на случай миграции данных)
      # Vertex SA (read-only) с хоста; путь = GOOGLE_APPLICATION_CREDENTIALS.
      - ${GEMINI_SA_HOST_PATH:-/home/ubuntu/secrets/gemini-sa-zhezu-052026.json}:/run/secrets/gemini-sa.json:ro
    depends_on:
      medtech-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8089:8000"   # локальная проверка
    networks:
      - medtech

  medtech-wa:
    build: ./wa-gateway
    container_name: medtech-wa
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://medtech:${POSTGRES_PASSWORD:-medtech}@medtech-db:5432/medtech
      WA_API_SECRET: ${WA_API_SECRET:-}
      WA_INBOUND_WEBHOOK_URL: http://medtech-backend:8000/api/wa/inbound
      WA_INBOUND_WEBHOOK_SECRET: ${WA_INBOUND_WEBHOOK_SECRET:-}
      WA_DAILY_LIMIT: ${WA_DAILY_LIMIT:-100}
      WA_REQUIRE_CLIENT_INITIATED: ${WA_REQUIRE_CLIENT_INITIATED:-true}
      LOG_LEVEL: ${WA_LOG_LEVEL:-info}
    depends_on:
      medtech-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3200:3200"   # локальная проверка/привязка QR
    networks:
      - medtech

  medtech-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://medtech.technokod.kz
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-}
    container_name: medtech-frontend
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://medtech-backend:8000
    depends_on:
      - medtech-backend
    ports:
      - "127.0.0.1:8088:3000"   # локальная проверка
    networks:
      - medtech

volumes:
  medtech_data:
  medtech_pgdata:

networks:
  medtech:
    name: medtech_net
