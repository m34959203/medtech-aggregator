services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medtech-db
    environment:
      POSTGRES_USER: medtech
      POSTGRES_PASSWORD: medtech
      POSTGRES_DB: medtech
    ports:
      - "5544:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtech"]
      interval: 5s
      timeout: 5s
      retries: 5
